<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur d'Emprunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Simulateur d'Emprunt Bancaire</h1>

    <div class="container">
        <div class="form-group">
            <label for="montant">Montant de l'emprunt (€) :</label>
            <input type="number" id="montant" value="100000" min="1" step="100">
        </div>
        <div class="form-group">
            <label for="taux">Taux annuel proposé (%) :</label>
            <input type="number" id="taux" value="4.5" min="0.1" step="0.1">
        </div>
        <div class="form-group">
            <label for="duree">Durée (en années) :</label>
            <input type="number" id="duree" value="5" min="1">
        </div>
        <div class="form-group">
            <label for="periodicite">Périodicité des remboursements :</label>
            <select id="periodicite">
                <option value="12">Mensuelle (12/an)</option>
                <option value="4">Trimestrielle (4/an)</option>
                <option value="2">Semestrielle (2/an)</option>
                <option value="1">Annuelle (1/an)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="mode">Mode de calcul :</label>
            <select id="mode">
                <option value="annuites_constantes">Annuités constantes</option>
                <option value="amortissements_constants">Amortissements constants</option>
            </select>
        </div>
        <button onclick="genererTableau()">Générer le tableau</button>
    </div>

    <div id="summary" class="summary"></div>

    <div class="table-container">
        <table id="tableau-emprunt" style="display: none;">
            <thead>
                <tr>
                    <th>Période</th>
                    <th>Capital restant dû (début)</th>
                    <th>Intérêts</th>
                    <th>Amortissement</th>
                    <th>Annuité / Échéance</th>
                    <th>Capital restant dû (fin)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
